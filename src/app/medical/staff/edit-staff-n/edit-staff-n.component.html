<div class="page-wrapper">
  <div class="content">
    <!-- Header -->
    <div class="page-header">
      <div class="row">
        <div class="col-sm-12">
          <ul class="breadcrumb">
            <li class="breadcrumb-item"><a href="#">{{ 'USERS' | translate }}</a></li>
            <li class="breadcrumb-item"><i class="feather icon-chevron-right"></i></li>
            <li class="breadcrumb-item active">{{ 'EDIT_USER' | translate }}</li>
          </ul>
        </div>
      </div>
    </div>

    <!-- Form -->
    <div class="row">
      <div class="col-sm-12">
        <div class="card">
          <div class="card-body" *ngIf="staff_selected">
            <form>
              <div class="row g-4">
                <div class="col-12">
                  <h4 class="mb-4">{{ 'EDIT_USER' | translate }}: #{{ staff_selected.id }}</h4>
                </div>

                <div class="col-md-4">
                  <label class="form-label">{{ 'FIRST_NAME' | translate }} *</label>
                  <input class="form-control" [(ngModel)]="name" name="name" type="text" required />
                </div>
                <div class="col-md-4">
                  <label class="form-label">{{ 'SURNAME' | translate }} *</label>
                  <input class="form-control" [(ngModel)]="surname" name="surname" type="text" required />
                </div>
                <div class="col-md-4">
                  <label class="form-label">{{ 'EMAIL' | translate }} *</label>
                  <input class="form-control" [(ngModel)]="email" name="email" type="email" required />
                </div>

                <div class="col-md-6">
                  <label class="form-label">{{ 'ROLE_SELECT' | translate }} *</label>
                  <mat-select [(ngModel)]="selectedValue" [ngModelOptions]="{standalone: true}" class="form-control select" [placeholder]="'SELECT_ROLE' | translate">
                    <mat-option *ngFor="let data of roles" [value]="data.id">
                      {{ data.name }}
                    </mat-option>
                  </mat-select>
                </div>

                <!-- Alerts -->
                <div class="col-12" *ngIf="text_success || text_validation">
                  <div *ngIf="text_success" class="alert alert-success">
                    <strong>{{ 'SUCCESS' | translate }}:</strong> {{ text_success }}
                  </div>
                  <div *ngIf="text_validation" class="alert alert-warning">
                    <strong>{{ 'WARNING' | translate }}:</strong> {{ text_validation }}
                  </div>
                </div>

                <!-- Button -->
                <div class="col-12 text-end">
                  <button type="button" class="btn btn-primary" (click)="save()">{{ 'SAVE' | translate }}</button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
