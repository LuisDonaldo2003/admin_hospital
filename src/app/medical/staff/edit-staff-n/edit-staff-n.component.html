<div class="page-wrapper">
    <div class="content">
      <!-- Encabezado -->
      <div class="page-header">
        <div class="row">
          <div class="col-sm-12">
            <ul class="breadcrumb">
              <li class="breadcrumb-item"><a href="#">Staffs</a></li>
              <li class="breadcrumb-item"><i class="feather icon-chevron-right"></i></li>
              <li class="breadcrumb-item active">Edit Staffs</li>
            </ul>
          </div>
        </div>
      </div>
  
      <!-- Formulario -->
      <div class="row">
        <div class="col-sm-12">
          <div class="card">
            <div class="card-body" *ngIf="staff_selected">
              <form>
                <div class="row g-4">
                  <div class="col-12">
                    <h4 class="mb-4">Staff Edit: #{{ staff_selected.id }}</h4>
                  </div>
  
                  <div class="col-md-4">
                    <label class="form-label">First Name *</label>
                    <input class="form-control" [(ngModel)]="name" name="name" type="text" />
                  </div>
                  <div class="col-md-4">
                    <label class="form-label">Surname *</label>
                    <input class="form-control" [(ngModel)]="surname" name="surname" type="text" />
                  </div>
                  <div class="col-md-4">
                    <label class="form-label">Mobile *</label>
                    <input class="form-control" [(ngModel)]="mobile" name="mobile" type="text" />
                  </div>
  
                  <div class="col-md-6">
                    <label class="form-label">Email *</label>
                    <input class="form-control" [(ngModel)]="email" name="email" type="email" />
                  </div>
                  <div class="col-md-3">
                    <label class="form-label">Password *</label>
                    <input class="form-control" [(ngModel)]="password" name="password" type="password" />
                  </div>
                  <div class="col-md-3">
                    <label class="form-label">Confirm Password *</label>
                    <input class="form-control" [(ngModel)]="password_confirmation" name="password_confirmation" type="password" />
                  </div>
  
                  <div class="col-md-4">
                    <label class="form-label">Date Of Birth *</label>
                    <input class="form-control" [(ngModel)]="birth_date" name="birth_date" type="text" matInput [matDatepicker]="picker" />
                    <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
                    <mat-datepicker #picker></mat-datepicker>
                  </div>
  
                  <div class="col-md-4">
                    <label class="form-label d-block">Gender *</label>
                    <div class="d-flex gap-4 mt-2">
                      <div class="form-check">
                        <input type="radio" class="form-check-input" id="male" name="gender" value="1" [(ngModel)]="gender" />
                        <label for="male" class="form-check-label">Male</label>
                      </div>
                      <div class="form-check">
                        <input type="radio" class="form-check-input" id="female" name="gender" value="2" [(ngModel)]="gender" />
                        <label for="female" class="form-check-label">Female</label>
                      </div>
                    </div>
                  </div>
  
                  <!-- Nuevos campos -->
                  <div class="col-md-4">
                    <label class="form-label">CURP</label>
                    <input class="form-control" [(ngModel)]="curp" name="curp" type="text" />
                  </div>
                  <div class="col-md-4">
                    <label class="form-label">RFC</label>
                    <input class="form-control" [(ngModel)]="rfc" name="rfc" type="text" />
                  </div>
                  <div class="col-md-4">
                    <label class="form-label">INE</label>
                    <input class="form-control" [(ngModel)]="ine" name="ine" type="text" />
                  </div>
                  <div class="col-md-4">
                    <label class="form-label">No. de Asistencia</label>
                    <input class="form-control" [(ngModel)]="attendance_number" name="attendance_number" type="text" />
                  </div>
                  <div class="col-md-4">
                    <label class="form-label">Cédula Profesional</label>
                    <input class="form-control" [(ngModel)]="professional_license" name="professional_license" type="text" />
                  </div>
                  <div class="col-md-4">
                    <label class="form-label">Función Real</label>
                    <input class="form-control" [(ngModel)]="funcion_real" name="funcion_real" type="text" />
                  </div>
  
                  <div class="col-md-6">
                    <label class="form-label">Departamento</label>
                    <select class="form-control" [(ngModel)]="departament_id" name="departament_id">
                      <option value="">Selecciona una</option>
                      <option *ngFor="let item of departaments" [value]="item.id">{{ item.name }}</option>
                    </select>
                  </div>
  
                  <div class="col-md-6">
                    <label class="form-label">Perfil Relacional</label>
                    <select class="form-control" [(ngModel)]="profile_id" name="profile_id">
                      <option value="">Selecciona uno</option>
                      <option *ngFor="let item of profiles" [value]="item.id">{{ item.name }}</option>
                    </select>
                  </div>
  
                  <div class="col-md-6">
                    <label class="form-label">Tipo de Contrato</label>
                    <select class="form-control" [(ngModel)]="contract_type_id" name="contract_type_id">
                      <option value="">Selecciona uno</option>
                      <option *ngFor="let item of contract_types" [value]="item.id">{{ item.name }}</option>
                    </select>
                  </div>
  
                  <div class="col-md-6">
                    <label class="form-label">Rol *</label>
                    <mat-select [(ngModel)]="selectedValue" [ngModelOptions]="{standalone: true}" class="form-control select" placeholder="Select Role">
                      <mat-option *ngFor="let data of roles" [value]="data.id">
                        {{ data.name }}
                      </mat-option>
                    </mat-select>
                  </div>
  
                  <div class="col-md-6">
                    <label class="form-label">Avatar *</label>
                    <input type="file" class="form-control" accept="image/*" (change)="loadFile($event)" />
                    <div class="mt-3" *ngIf="IMAGEN_PREVIZUALIZA">
                      <img [src]="IMAGEN_PREVIZUALIZA" class="img-thumbnail" width="200" alt="Preview" />
                    </div>
                  </div>
  
                  <!-- Alertas -->
                  <div class="col-12" *ngIf="text_success || text_validation">
                    <div *ngIf="text_success" class="alert alert-success">
                      <strong>Éxito:</strong> {{ text_success }}
                    </div>
                    <div *ngIf="text_validation" class="alert alert-warning">
                      <strong>Advertencia:</strong> {{ text_validation }}
                    </div>
                  </div>
  
                  <!-- Botón -->
                  <div class="col-12 text-end">
                    <button type="button" class="btn btn-primary" (click)="save()">Guardar</button>
                  </div>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
