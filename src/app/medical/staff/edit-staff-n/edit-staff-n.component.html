<div class="page-wrapper">
  <div class="content">
    <!-- Encabezado -->
    <div class="page-header">
      <div class="row">
        <div class="col-sm-12">
          <ul class="breadcrumb">
            <li class="breadcrumb-item"><a href="#">Staffs</a></li>
            <li class="breadcrumb-item"><i class="feather icon-chevron-right"></i></li>
            <li class="breadcrumb-item active">Edit Staff</li>
          </ul>
        </div>
      </div>
    </div>

    <!-- Formulario -->
    <div class="row">
      <div class="col-sm-12">
        <div class="card">
          <div class="card-body" *ngIf="staff_selected">
            <form>
              <div class="row g-4">
                <div class="col-12">
                  <h4 class="mb-4">Staff Edit: #{{ staff_selected.id }}</h4>
                </div>

                <div class="col-md-4">
                  <label class="form-label">First Name *</label>
                  <input class="form-control" [(ngModel)]="name" name="name" type="text" required />
                </div>
                <div class="col-md-4">
                  <label class="form-label">Surname *</label>
                  <input class="form-control" [(ngModel)]="surname" name="surname" type="text" required />
                </div>
                <div class="col-md-4">
                  <label class="form-label">Email *</label>
                  <input class="form-control" [(ngModel)]="email" name="email" type="email" required />
                </div>

                <div class="col-md-6">
                  <label class="form-label">Rol *</label>
                  <mat-select [(ngModel)]="selectedValue" [ngModelOptions]="{standalone: true}" class="form-control select" placeholder="Select Role">
                    <mat-option *ngFor="let data of roles" [value]="data.id">
                      {{ data.name }}
                    </mat-option>
                  </mat-select>
                </div>

                <!-- Alertas -->
                <div class="col-12" *ngIf="text_success || text_validation">
                  <div *ngIf="text_success" class="alert alert-success">
                    <strong>Éxito:</strong> {{ text_success }}
                  </div>
                  <div *ngIf="text_validation" class="alert alert-warning">
                    <strong>Advertencia:</strong> {{ text_validation }}
                  </div>
                </div>

                <!-- Botón -->
                <div class="col-12 text-end">
                  <button type="button" class="btn btn-primary" (click)="save()">Guardar</button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
