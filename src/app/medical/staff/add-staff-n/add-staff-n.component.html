<div class="page-wrapper">
  <div class="content">
    <!-- Encabezado -->
    <div class="page-header mb-4">
      <div class="row">
        <div class="col-sm-12">
          <nav aria-label="breadcrumb">
            <ol class="breadcrumb bg-light p-2 rounded">
              <li class="breadcrumb-item"><a href="#">Staffs</a></li>
              <li class="breadcrumb-item active" aria-current="page">Add Staff</li>
            </ol>
          </nav>
        </div>
      </div>
    </div>

    <!-- Formulario -->
    <div class="row">
      <div class="col-sm-12">
        <div class="card shadow-sm border-0">
          <div class="card-body">
            <form>
              <h4 class="mb-4">Add New Staff</h4>
              <div class="row g-4">
                <!-- Datos generales -->
                <div class="col-md-4">
                  <label class="form-label">First Name *</label>
                  <input type="text" class="form-control" [(ngModel)]="name" name="name" />
                </div>
                <div class="col-md-4">
                  <label class="form-label">Surname *</label>
                  <input type="text" class="form-control" [(ngModel)]="surname" name="surname" />
                </div>
                <div class="col-md-4">
                  <label class="form-label">Mobile *</label>
                  <input type="text" class="form-control" [(ngModel)]="mobile" name="mobile" />
                </div>

                <div class="col-md-6">
                  <label class="form-label">Email *</label>
                  <input type="email" class="form-control" [(ngModel)]="email" name="email" />
                </div>
                <div class="col-md-3">
                  <label class="form-label">Password *</label>
                  <input type="password" class="form-control" [(ngModel)]="password" name="password" />
                </div>
                <div class="col-md-3">
                  <label class="form-label">Confirm Password *</label>
                  <input type="password" class="form-control" [(ngModel)]="password_confirmation" name="password_confirmation" />
                </div>

                <div class="col-md-4">
                  <label class="form-label">Date of Birth *</label>
                  <div class="position-relative">
                    <input class="form-control pe-5" [(ngModel)]="birth_date" name="birth_date" matInput [matDatepicker]="picker" placeholder="DD/MM/YYYY" />
                    <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
                    <mat-datepicker #picker></mat-datepicker>
                  </div>
                </div>
                <div class="col-md-4">
                  <label class="form-label d-block">Gender *</label>
                  <div class="d-flex gap-4 mt-2">
                    <div class="form-check">
                      <input type="radio" class="form-check-input" id="male" name="gender" value="1" [(ngModel)]="gender" />
                      <label for="male" class="form-check-label">Male</label>
                    </div>
                    <div class="form-check">
                      <input type="radio" class="form-check-input" id="female" name="gender" value="2" [(ngModel)]="gender" />
                      <label for="female" class="form-check-label">Female</label>
                    </div>
                  </div>
                </div>
                <!-- Nuevos campos -->
                <div class="col-md-4">
                  <label class="form-label">CURP</label>
                  <input type="text" class="form-control" [(ngModel)]="curp" name="curp" />
                </div>
                <div class="col-md-4">
                  <label class="form-label">RFC</label>
                  <input type="text" class="form-control" [(ngModel)]="rfc" name="rfc" />
                </div>
                <div class="col-md-4">
                  <label class="form-label">INE</label>
                  <input type="text" class="form-control" [(ngModel)]="ine" name="ine" />
                </div>
                <div class="col-md-4">
                  <label class="form-label">No. de Asistencia</label>
                  <input type="text" class="form-control" [(ngModel)]="attendance_number" name="attendance_number" />
                </div>
                <div class="col-md-4">
                  <label class="form-label">Cédula Profesional</label>
                  <input type="text" class="form-control" [(ngModel)]="professional_license" name="professional_license" />
                </div>
                <div class="col-md-4">
                  <label class="form-label">Función Real</label>
                  <input type="text" class="form-control" [(ngModel)]="funcion_real" name="function_staff" />
                </div>
                <div class="col-md-6">
                  <label class="form-label">Departamento</label>
                  <select class="form-control" [(ngModel)]="departament_id" name="departament_id">
                    <option value="">Selecciona una</option>
                    <option *ngFor="let item of departaments" [value]="item.id">{{ item.name }}</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Perfil Relacional</label>
                  <select class="form-control" [(ngModel)]="profile_id" name="profile_id">
                    <option value="">Selecciona uno</option>
                    <option *ngFor="let item of profiles" [value]="item.id">{{ item.name }}</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Tipo de Contrato</label>
                  <select class="form-control" [(ngModel)]="contract_type_id" name="contract_type_id">
                    <option value="">Selecciona uno</option>
                    <option *ngFor="let item of contract_types" [value]="item.id">{{ item.name }}</option>
                  </select>
                </div>

                <!-- Rol y otros -->

                <div class="col-md-6">
                  <label class="form-label">Role *</label>
                  <select class="form-control" [(ngModel)]="selectedValue" name="role" required>
                    <option value="" disabled selected>Seleccione un rol</option>
                    <option *ngFor="let data of roles" [value]="data.id">{{ data.name }}</option>
                  </select>
                </div>

                <div class="col-md-6">
                  <label class="form-label">Avatar *</label>
                  <input type="file" class="form-control" accept="image/*" (change)="loadFile($event)" />
                  <div class="mt-3" *ngIf="FILE_AVATAR">
                    <img [src]="IMAGE_PREVIZUALIZA" class="img-thumbnail" width="200" alt="Preview" />
                  </div>
                </div>

                <!-- Mensajes -->
                <div class="col-12" *ngIf="text_success || text_validation">
                  <div *ngIf="text_success" class="alert alert-success">
                    <strong>Éxito:</strong> {{ text_success }}
                  </div>
                  <div *ngIf="text_validation" class="alert alert-warning">
                    <strong>Advertencia:</strong> {{ text_validation }}
                  </div>
                </div>

                <!-- Botón -->
                <div class="col-12 text-end mt-3">
                  <button type="button" class="btn btn-primary px-4" (click)="save()">Guardar</button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
</div>
