<div class="page-wrapper">
  <div class="content">
    <!-- Header -->
    <div class="page-header mb-4">
      <div class="row">
        <div class="col-sm-12">
          <ol class="breadcrumb bg-light p-2 rounded">
            <li class="breadcrumb-item"><a href="#">Staffs</a></li>
            <li class="breadcrumb-item active">Add Staff</li>
          </ol>
        </div>
      </div>
    </div>

    <!-- Form Container -->
    <div class="row justify-content-center">
      <div class="col-lg-10">
        <div class="card shadow-sm border-0">
          <div class="card-body">
            <h4 class="mb-4 text-center">Add New Staff</h4>
            <form>

              <!-- First Name -->
              <div class="mb-3 row">
                <label class="col-sm-3 col-form-label">First Name *</label>
                <div class="col-sm-9">
                  <input type="text" class="form-control" [(ngModel)]="name" name="name" />
                </div>
              </div>

              <!-- Surname -->
              <div class="mb-3 row">
                <label class="col-sm-3 col-form-label">Surname *</label>
                <div class="col-sm-9">
                  <input type="text" class="form-control" [(ngModel)]="surname" name="surname" />
                </div>
              </div>

              <!-- Mobile -->
              <div class="mb-3 row">
                <label class="col-sm-3 col-form-label">Mobile *</label>
                <div class="col-sm-9">
                  <input type="text" class="form-control" [(ngModel)]="mobile" name="mobile" />
                </div>
              </div>

              <!-- Email -->
              <div class="mb-3 row">
                <label class="col-sm-3 col-form-label">Email *</label>
                <div class="col-sm-9">
                  <input type="email" class="form-control" [(ngModel)]="email" name="email" />
                </div>
              </div>

              <!-- Password -->
              <div class="mb-3 row">
                <label class="col-sm-3 col-form-label">Password *</label>
                <div class="col-sm-9">
                  <input type="password" class="form-control" [(ngModel)]="password" name="password" />
                </div>
              </div>

              <!-- Confirm Password -->
              <div class="mb-3 row">
                <label class="col-sm-3 col-form-label">Confirm Password *</label>
                <div class="col-sm-9">
                  <input type="password" class="form-control" [(ngModel)]="password_confirmation" name="password_confirmation" />
                </div>
              </div>

              <!-- Date of Birth -->
              <div class="mb-3 row">
                <label class="col-sm-3 col-form-label">Date of Birth *</label>
                <div class="col-sm-9">
                  <div class="datepicker-wrapper position-relative">
                    <input
                      class="form-control"
                      [(ngModel)]="birth_date"
                      name="birth_date"
                      matInput
                      [matDatepicker]="picker"
                      placeholder="DD/MM/YYYY"
                    />
                    <mat-datepicker-toggle matSuffix [for]="picker" class="datepicker-toggle"></mat-datepicker-toggle>
                    <mat-datepicker #picker></mat-datepicker>
                  </div>
                </div>
              </div>




              <!-- Gender -->
              <div class="mb-3 row">
                <label class="col-sm-3 col-form-label">Gender *</label>
                <div class="col-sm-9 d-flex align-items-center gap-4">
                  <div class="form-check">
                    <input type="radio" class="form-check-input" id="male" name="gender" value="1" [(ngModel)]="gender" />
                    <label for="male" class="form-check-label">Male</label>
                  </div>
                  <div class="form-check">
                    <input type="radio" class="form-check-input" id="female" name="gender" value="2" [(ngModel)]="gender" />
                    <label for="female" class="form-check-label">Female</label>
                  </div>
                </div>
              </div>

              <!-- Additional Fields -->
              <div class="mb-3 row">
                <label class="col-sm-3 col-form-label">CURP</label>
                <div class="col-sm-9">
                  <input type="text" class="form-control" [(ngModel)]="curp" name="curp" />
                </div>
              </div>

              <div class="mb-3 row">
                <label class="col-sm-3 col-form-label">RFC</label>
                <div class="col-sm-9">
                  <input type="text" class="form-control" [(ngModel)]="rfc" name="rfc" />
                </div>
              </div>

              <div class="mb-3 row">
                <label class="col-sm-3 col-form-label">INE</label>
                <div class="col-sm-9">
                  <input type="text" class="form-control" [(ngModel)]="ine" name="ine" />
                </div>
              </div>

              <div class="mb-3 row">
                <label class="col-sm-3 col-form-label">Attendance No.</label>
                <div class="col-sm-9">
                  <input type="text" class="form-control" [(ngModel)]="attendance_number" name="attendance_number" />
                </div>
              </div>

              <div class="mb-3 row">
                <label class="col-sm-3 col-form-label">Professional License</label>
                <div class="col-sm-9">
                  <input type="text" class="form-control" [(ngModel)]="professional_license" name="professional_license" />
                </div>
              </div>

              <div class="mb-3 row">
                <label class="col-sm-3 col-form-label">Real Function</label>
                <div class="col-sm-9">
                  <input type="text" class="form-control" [(ngModel)]="funcion_real" name="function_staff" />
                </div>
              </div>

              <!-- Selects -->
              <div class="mb-3 row">
                <label class="col-sm-3 col-form-label">Department</label>
                <div class="col-sm-9">
                  <select class="form-control" [(ngModel)]="departament_id" name="departament_id">
                    <option value="">Selecciona una</option>
                    <option *ngFor="let item of departaments" [value]="item.id">{{ item.name }}</option>
                  </select>
                </div>
              </div>

              <div class="mb-3 row">
                <label class="col-sm-3 col-form-label">Profile</label>
                <div class="col-sm-9">
                  <select class="form-control" [(ngModel)]="profile_id" name="profile_id">
                    <option value="">Selecciona uno</option>
                    <option *ngFor="let item of profiles" [value]="item.id">{{ item.name }}</option>
                  </select>
                </div>
              </div>

              <div class="mb-3 row">
                <label class="col-sm-3 col-form-label">Contract Type</label>
                <div class="col-sm-9">
                  <select class="form-control" [(ngModel)]="contract_type_id" name="contract_type_id">
                    <option value="">Selecciona uno</option>
                    <option *ngFor="let item of contract_types" [value]="item.id">{{ item.name }}</option>
                  </select>
                </div>
              </div>

              <div class="mb-3 row">
                <label class="col-sm-3 col-form-label">Role *</label>
                <div class="col-sm-9">
                  <select class="form-control" [(ngModel)]="selectedValue" name="role" required>
                    <option value="" disabled selected>Seleccione un rol</option>
                    <option *ngFor="let data of roles" [value]="data.id">{{ data.name }}</option>
                  </select>
                </div>
              </div>

              <!-- Avatar -->
              <div class="mb-3 row">
                <label class="col-sm-3 col-form-label">Avatar *</label>
                <div class="col-sm-9">
                  <input type="file" class="form-control" accept="image/*" (change)="loadFile($event)" />
                  <div class="mt-3" *ngIf="IMAGEN_PREVIZUALIZA">
                    <img [src]="IMAGEN_PREVIZUALIZA" class="img-thumbnail" width="200" alt="Preview" />
                  </div>
                </div>
              </div>

              <!-- Alertas -->
              <div class="mb-3" *ngIf="text_success">
                <div class="alert alert-success alert-dismissible fade show">
                  <strong>Éxito:</strong> {{ text_success }}
                  <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
              </div>

              <div class="mb-3" *ngIf="text_validation">
                <div class="alert alert-warning alert-dismissible fade show">
                  <strong>Advertencia:</strong> {{ text_validation }}
                  <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
              </div>

              <!-- Save Button -->
              <div class="text-end mt-4">
                <button type="button" class="btn btn-primary px-4" (click)="save()">Guardar</button>
              </div>

            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
