<div class="page-wrapper">
    <div class="content">
      <!-- Page Header -->
      <div class="page-header mb-4">
        <div class="row">
          <div class="col">
            <nav aria-label="breadcrumb">
              <ol class="breadcrumb bg-light p-2 rounded">
                <li class="breadcrumb-item"><a href="#">Roles y Permisos</a></li>
                <li class="breadcrumb-item active" aria-current="page">Edición</li>
              </ol>
            </nav>
          </div>
        </div>
      </div>
      <!-- /Page Header -->
  
      <div class="row justify-content-center g-4">
        <!-- Editar Rol -->
        <div class="col-lg-8">
          <div class="card shadow-sm border-0">
            <div class="card-body">
              <h4 class="card-title mb-4">Editar Rol: <span class="text-primary">{{ name }}</span></h4>
              <form action="#" novalidate>
                <div class="mb-3 row align-items-center">
                  <label class="col-md-2 col-form-label">Nombre</label>
                  <div class="col-md-10">
                    <input type="text" name="name" [(ngModel)]="name" class="form-control" placeholder="Nuevo nombre del rol">
                  </div>
                </div>
  
                <div class="text-end">
                  <button class="btn btn-primary" (click)="save()">Editar</button>
                </div>
  
                <!-- Alertas -->
                <div class="mt-3" *ngIf="valid_form">
                  <div class="alert alert-danger alert-dismissible fade show" role="alert">
                    <strong>Error:</strong> Es necesario llenar un nombre y seleccionar un permiso.
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                  </div>
                </div>
  
                <div class="mt-3" *ngIf="valid_form_success">
                  <div class="alert alert-success alert-dismissible fade show" role="alert">
                    <strong>Éxito:</strong> El rol se editó correctamente.
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                  </div>
                </div>
  
                <div class="mt-3" *ngIf="text_validation">
                  <div class="alert alert-warning alert-dismissible fade show" role="alert">
                    <strong>Atención:</strong> {{ text_validation }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                  </div>
                </div>
              </form>
            </div>
          </div>
        </div>
  
        <!-- Asignación de Permisos -->
        <div class="col-lg-8">
          <div class="card shadow-sm border-0">
            <div class="card-body">
              <h4 class="card-title mb-4">Asignación de permisos</h4>
              <div class="table-responsive">
                <table class="table table-hover align-middle">
                  <thead class="table-light">
                    <tr>
                      <th>Sección</th>
                      <th>Permisos</th>
                    </tr>
                  </thead>
                  <tbody>
                    <ng-container *ngFor="let side of sideBar">
                      <tr>
                        <td>{{ side.menuValue }}</td>
                        <td>
                          <div *ngIf="side.subMenus?.length > 0">
                            <div class="form-check mb-1" *ngFor="let subMenu of side.subMenus">
                              <input class="form-check-input"
                                     type="checkbox"
                                     [checked]="permissions?.includes(subMenu.permision)"
                                     (click)="addPermission(subMenu)"
                                     id="{{ subMenu.menuValue }}">
                              <label class="form-check-label" [for]="subMenu.menuValue">
                                {{ subMenu.menuValue }}
                              </label>
                            </div>
                          </div>
                          <div *ngIf="side.subMenus?.length === 0">
                            <div class="form-check">
                              <input class="form-check-input"
                                     type="checkbox"
                                     [checked]="permissions?.includes(side.permision)"
                                     (click)="addPermission(side)"
                                     id="{{ side.menuValue }}">
                              <label class="form-check-label" [for]="side.menuValue">
                                {{ side.menuValue }}
                              </label>
                            </div>
                          </div>
                        </td>
                      </tr>
                    </ng-container>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
  
      </div>
    </div>
  </div>
