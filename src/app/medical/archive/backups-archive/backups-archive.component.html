<!-- backups-archive.component.html -->
<div class="page-wrapper">
  <div class="content export-archive">

    <!-- Encabezado -->
    <div class="page-header mb-4">
      <div class="row">
        <div class="col-sm-12">
          <h3 class="fw-bold">{{ 'BACKUPS_TITLE' | translate }}</h3>
          <p class="text-muted">{{ 'BACKUPS_SUBTITLE' | translate }}</p>
        </div>
      </div>
    </div>

    <!-- Lista de respaldos -->
    <div class="card mt- mb-4 border-colored">
      <div class="card-header bg-primary text-white d-flex align-items-center">
        <i class="fa fa-database me-2"></i>
        <span>{{ 'BACKUPS_AVAILABLE' | translate }}</span>
      </div>
      <div class="card-body">
        <ul class="list-group">
          <li *ngFor="let backup of backups" class="list-group-item d-flex justify-content-between align-items-center">
            <div>
              <i class="fa fa-file-archive text-secondary me-2"></i>
              <span class="fw-semibold backup-filename">{{ backup.filename }}</span>
              <span class="badge bg-info text-dark ms-2 text-uppercase">{{ backup.type }}</span>
            </div>
            <button class="btn btn-success px-3" (click)="downloadBackup(backup.filename)">
              <i class="fa fa-download me-1"></i> {{ 'DOWNLOAD' | translate }}
            </button>
          </li>
          <li *ngIf="backups.length === 0" class="list-group-item text-muted text-center">
            <i class="fa fa-info-circle me-1"></i> {{ 'NO_BACKUPS_AVAILABLE' | translate }}
          </li>
        </ul>
      </div>
    </div>

  </div>
</div>
