<div class="page-wrapper">
  <div class="content">
    <!-- Encabezado -->
    <div class="page-header mb-4">
      <div class="row">
        <div class="col-sm-12">
          <ol class="breadcrumb bg-light p-2 rounded">
            <li class="breadcrumb-item"><a href="#">Departament</a></li>
            <li class="breadcrumb-item active">Departament Register</li>
          </ol>
        </div>
      </div>
    </div>

    <!-- Formulario -->
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card shadow-sm border-0">
          <div class="card-body">
            <h4 class="mb-4">Creation of a Department</h4>

            <form>
              <div class="mb-3 row">
                <label for="name" class="col-sm-2 col-form-label">Name</label>
                <div class="col-sm-10">
                  <input type="text" id="name" name="name" [(ngModel)]="name" class="form-control" placeholder="Ingrese el nombre de la especialidad" />
                </div>
              </div>

              <!-- Mensajes -->
              <div class="mb-3" *ngIf="valid_form">
                <div class="alert alert-danger alert-dismissible fade show" role="alert">
                  <strong>Error:</strong> Es necesario llenar un nombre y seleccionar un permiso.
                  <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
                </div>
              </div>

              <div class="mb-3" *ngIf="valid_form_success">
                <div class="alert alert-success alert-dismissible fade show" role="alert">
                  <strong>Éxito:</strong> La especialidad se creó correctamente.
                  <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
                </div>
              </div>

              <div class="mb-3" *ngIf="text_validation">
                <div class="alert alert-warning alert-dismissible fade show" role="alert">
                  <strong>Atención:</strong> {{ text_validation }}
                  <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
                </div>
              </div>

              <!-- Botón -->
              <div class="text-end">
                <button type="button" class="btn btn-primary px-4" (click)="save()">Save</button>
              </div>
            </form>

          </div>
        </div>
      </div>
    </div>
  </div>
</div>
