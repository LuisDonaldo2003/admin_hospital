<div class="page-wrapper">
  <!-- Page Content -->
  <div class="content container-fluid">

    <!-- Page Header -->
    <div class="page-header">
      <div class="row">
        <div class="col-sm-12">
          <ul class="breadcrumb">
            <li class="breadcrumb-item">
              <a [routerLink]="routes.adminDashboard">Dashboard</a>
            </li>
            <li class="breadcrumb-item">
              <i class="feather icon-chevron-right"></i>
            </li>
            <li class="breadcrumb-item active">Settings</li>
          </ul>
        </div>
      </div>
    </div>
    <!-- /Page Header -->

    <div class="settings-menu-links">
      <ul class="nav nav-tabs menu-tabs">
        <li class="nav-item active">
          <a class="nav-link" [routerLink]="routes.settings">General Settings</a>
        </li>
      </ul>
    </div>

    <div class="row">
      <div class="col-md-6">

       <!-- 🌓 Modo Oscuro -->
      <div class="card mb-4">
        <div class="card-header">
          <h5 class="card-title">Dark Mode</h5>
        </div>
        <div class="card-body pt-0">
          <form>
            <div class="form-group mt-3"> <!-- ← Agregamos mt-3 aquí -->
              <div class="status-toggle d-flex justify-content-between align-items-center">
                <p class="mb-0">Activate Dark Mode</p>
                <div class="d-flex align-items-center gap-2">
                  <span class="me-2" style="font-size: 0.9rem;">OFF</span>
                  <input
                    type="checkbox"
                    id="toggle-dark"
                    class="check"
                    [checked]="isDarkMode"
                    (change)="toggleTheme()" />
                  <label for="toggle-dark" class="checktoggle">switch</label>
                  <span class="ms-2" style="font-size: 0.9rem;">ON</span>
                </div>
              </div>
            </div>
          </form>
        </div>
      </div>


        <!-- 🎨 Card: Outline Color -->
        <div class="card">
          <div class="card-header">
            <h5 class="card-title mb-1">Outline Color</h5>
            <p class="text-muted mb-0" style="font-size: 0.9rem;">For profile picture border</p>
          </div>
          <div class="card-body">
            <form>
              <div class="form-group">
                <label for="borderColor" class="form-label fw-semibold mb-2">Select a color</label>
                <div class="d-flex align-items-center gap-3 mt-1">

                  <!-- 🎨 Input color con sombra y borde -->
                  <input
                    type="color"
                    id="borderColor"
                    [(ngModel)]="borderColor"
                    name="borderColor"
                    class="form-control form-control-color"
                    style="width: 60px; height: 60px; border-radius: 12px; border: none; box-shadow: 0 0 6px rgba(0,0,0,0.2);" />

                  <!-- 🟢 Botón estilizado -->
                  <button
                    type="button"
                    class="btn btn-outline-light px-4"
                    (click)="updateBorderColor()"
                    style="border-radius: 8px;">
                    Apply Color
                  </button>

                </div>
              </div>
            </form>
          </div>
        </div>


      </div>

      <div class="col-md-6">
        <!-- Aquí puedes añadir más configuraciones o tarjetas -->
      </div>
    </div>
  </div>
</div>
